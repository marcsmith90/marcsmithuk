<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Marc Smith</a>
      <nav class="site-nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="gallery.html" class="nav-link">Gallery</a></li>
          <li><a href="contact.html" class="nav-link">Contact</a></li>
        </ul>
      </nav>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
        <span class="hamburger-bar"></span>
      </button>
    </div>
  </header>

  <main class="site-main">
    <section class="hero">
      <div class="hero-content">
        <p class="hero-eyebrow">Marc Smith</p>
        <h1 class="hero-title">Nature &amp;<br>Landscape<br>Photography</h1>
        <span class="hero-rule" aria-hidden="true"></span>
        <a href="gallery.html" class="btn btn-outline">View Gallery</a>
      </div>
      <div class="scroll-indicator" aria-hidden="true">
        <span class="scroll-arrow"></span>
      </div>
    </section>

    <section class="about-teaser fade-in">
      <div class="about-inner">
        <blockquote class="about-quote">
          Capturing wild landscapes<br>and quiet moments in nature.
        </blockquote>
        <cite class="about-cite">Marc Smith &mdash; United Kingdom</cite>
      </div>
    </section>

    <section class="featured">
      <div class="featured-inner">
        <h2 class="featured-title fade-in">Recent Work</h2>
        <div class="featured-grid">
          <a href="gallery.html" class="featured-item fade-in">
            <img src="images/IMG_6391.webp" alt="Featured photograph 1" class="featured-img">
            <span class="featured-overlay">View Gallery</span>
          </a>
          <a href="gallery.html" class="featured-item fade-in">
            <img src="images/IMG_6436.webp" alt="Featured photograph 2" class="featured-img">
            <span class="featured-overlay">View Gallery</span>
          </a>
          <a href="gallery.html" class="featured-item fade-in">
            <img src="images/IMG_6481.webp" alt="Featured photograph 3" class="featured-img">
            <span class="featured-overlay">View Gallery</span>
          </a>
          <a href="gallery.html" class="featured-item fade-in">
            <img src="images/IMG_6445.webp" alt="Featured photograph 4" class="featured-img">
            <span class="featured-overlay">View Gallery</span>
          </a>
        </div>
        <a href="gallery.html" class="view-all-link fade-in">View All Photos &rarr;</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Marc Smith</p>
    <a href="https://instagram.com/marcsmithuk" class="social-link" aria-label="Instagram" target="_blank" rel="noopener">
      <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
    </a>
  </footer>

  <script src="nav.js"></script>
  <script>
    (function () {
      var els = document.querySelectorAll('.fade-in');
      if (!els.length || !window.IntersectionObserver) return;
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.15 });
      els.forEach(function (el) { io.observe(el); });
    })();
  </script>
</body>
</html>
