  <script src="nav.js"></script>
  <script>
    (function () {
      // Fade-in on scroll
      var fadeEls = document.querySelectorAll('.fade-in');
      if (window.IntersectionObserver) {
        var io = new IntersectionObserver(function (entries) {
          entries.forEach(function (e) {
            if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
          });
        }, { threshold: 0.08 });
        fadeEls.forEach(function (el) { io.observe(el); });
      }

      // Gallery filter
      var filterBtns = document.querySelectorAll('.filter-btn');
      var items = document.querySelectorAll('.gallery-item');
      filterBtns.forEach(function (btn) {
        btn.addEventListener('click', function () {
          filterBtns.forEach(function (b) { b.classList.remove('active'); });
          btn.classList.add('active');
          var filter = btn.dataset.filter;
          items.forEach(function (item) {
            if (filter === 'all' || item.dataset.category === filter) {
              item.style.display = '';
            } else {
              item.style.display = 'none';
            }
          });
        });
      });

      // Lightbox
      var lightbox = document.getElementById('lightbox');
      var lightboxImg = lightbox.querySelector('.lightbox-img');
      var visibleImages = [];
      var currentIndex = 0;

      function getVisibleItems() {
        return Array.from(items).filter(function (i) { return i.style.display !== 'none'; });
      }

      function openLightbox(index) {
        visibleImages = getVisibleItems();
        currentIndex = index;
        lightboxImg.src = visibleImages[currentIndex].querySelector('img').src;
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lightboxImg.src = '';
      }

      function showPrev() {
        currentIndex = (currentIndex - 1 + visibleImages.length) % visibleImages.length;
        lightboxImg.src = visibleImages[currentIndex].querySelector('img').src;
      }

      function showNext() {
        currentIndex = (currentIndex + 1) % visibleImages.length;
        lightboxImg.src = visibleImages[currentIndex].querySelector('img').src;
      }

      items.forEach(function (item, i) {
        item.addEventListener('click', function () { openLightbox(i); });
      });

      lightbox.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
      lightbox.querySelector('.lightbox-prev').addEventListener('click', function (e) { e.stopPropagation(); showPrev(); });
      lightbox.querySelector('.lightbox-next').addEventListener('click', function (e) { e.stopPropagation(); showNext(); });
      lightbox.addEventListener('click', function (e) { if (e.target === lightbox || e.target === lightbox.querySelector('.lightbox-inner')) closeLightbox(); });

      document.addEventListener('keydown', function (e) {
        if (!lightbox.classList.contains('active')) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft') showPrev();
        if (e.key === 'ArrowRight') showNext();
      });
    })();
  </script>
